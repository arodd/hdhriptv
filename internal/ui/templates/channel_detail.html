<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --panel: #ffffff;
      --border: #d6deeb;
      --text: #152035;
      --muted: #5a667b;
      --brand: #0d63e6;
      --brand-soft: #eaf2ff;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", Tahoma, sans-serif;
      background: linear-gradient(180deg, #f5f7fc 0%, #eef2f9 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      background: #10192a;
      color: #f5f8ff;
    }

    .brand {
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .topnav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .topnav a {
      color: #dbe7ff;
      text-decoration: none;
      border: 1px solid #2f4c77;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.9rem;
    }

    .topnav a.active {
      background: #1f3b68;
      border-color: #3764a8;
      color: #fff;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(16, 25, 42, 0.08);
      overflow: hidden;
    }

    .panel h2 {
      margin: 0;
      padding: 12px 14px;
      font-size: 1rem;
      border-bottom: 1px solid var(--border);
      background: #fafdff;
    }

    .panel-body {
      padding: 12px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"] {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.92rem;
      color: var(--text);
      background: #fff;
      min-width: 220px;
      flex: 1;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-size: 0.9rem;
    }

    button {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    button.primary {
      border-color: var(--brand);
      background: var(--brand);
      color: #fff;
    }

    button.secondary {
      border-color: #b9cbea;
      background: var(--brand-soft);
      color: #1c4a87;
    }

    button.danger {
      border-color: #efc8c4;
      background: #fff5f4;
      color: var(--danger);
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    .status {
      border-radius: 8px;
      padding: 8px 10px;
      border: 1px solid #c7d9ff;
      background: #ecf3ff;
      color: #194d95;
      font-size: 0.88rem;
      margin-bottom: 10px;
    }

    .status.error {
      border-color: #f0c5c5;
      background: #fff3f3;
      color: #a53a3a;
    }

    .meta {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 10px;
    }

    .source-row {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      display: grid;
      gap: 8px;
    }

    .source-title {
      font-weight: 600;
    }

    .source-meta {
      color: var(--muted);
      font-size: 0.84rem;
      word-break: break-all;
    }

    .source-url {
      color: #1d2f4d;
      font-size: 0.86rem;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #dce5f5;
      background: #f7faff;
      word-break: break-all;
    }

    .row-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .empty {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 8px 2px;
    }

    .rule-editor {
      width: 100%;
      border: 1px solid #dce5f5;
      border-radius: 10px;
      padding: 10px;
      display: grid;
      gap: 8px;
      background: #f8fbff;
    }

    .rule-editor input[type="text"] {
      min-width: 0;
      width: 100%;
    }

{{template "shared-css-chips"}}

    .group-picker {
      border-radius: 8px;
      background: #ffffff;
    }

    .source-picker {
      width: 100%;
      border: 1px solid #c2e0d9;
      border-radius: 10px;
      background: #f5fcfa;
      padding: 8px;
      display: grid;
      gap: 8px;
    }

    .source-picker-label {
      color: #156b5a;
      font-size: 0.82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .source-picker-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .source-dropdown {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      padding: 6px;
      display: grid;
      gap: 2px;
      max-height: 200px;
      overflow-y: auto;
    }

    .source-dropdown label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 6px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
    }

    .source-dropdown label:hover {
      background: #e6f7f4;
    }

    .rule-hint {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .search-warning {
      border-radius: 8px;
      padding: 8px 10px;
      border: 1px solid #f0c5c5;
      background: #fff3f3;
      color: #a53a3a;
      font-size: 0.84rem;
    }

    .mode-toggle {
      color: var(--muted);
      font-size: 0.84rem;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">{{.AppTitle}}</div>
    <nav class="topnav">
      <a href="/ui/catalog">Catalog</a>
      <a href="/ui/channels" class="active">Channels</a>
      <a href="/ui/merge">Merge Suggestions</a>
      <a href="/ui/tuners">Tuners</a>
      {{if .NavShowDVR}}<a href="/ui/dvr">DVR</a>{{end}}
      {{if .NavShowAutomation}}<a href="/ui/automation">Automation</a>{{end}}
    </nav>
  </header>

  <main>
    <section class="panel">
      <h2>Channel Details</h2>
      <div class="panel-body">
        <div id="status" class="status" hidden></div>
        <div id="channel-meta" class="meta"></div>

        <form id="channel-form" class="toolbar">
          <input id="guide-name" type="text" placeholder="Guide name">
          <label>
            <input id="channel-enabled" type="checkbox">
            Enabled
          </label>
          <div class="rule-editor">
            <label>
              <input id="dynamic-enabled" type="checkbox">
              Dynamic source rule enabled
            </label>

            <div class="group-picker">
              <div class="group-picker-label">Dynamic Catalog Groups (Multi-select)</div>
              <div id="dynamic-group-chips" class="selected-groups"></div>
              <div class="group-picker-controls">
                <input id="dynamic-group-input" type="text" list="dynamic-group-options" placeholder="Add catalog group filter (blank = all groups)">
                <button id="dynamic-group-add" type="button">Add Group</button>
                <button id="dynamic-group-clear" type="button">All Groups</button>
              </div>
            </div>

            <div class="source-picker">
              <div class="source-picker-label">Playlist Source Filter</div>
              <div id="dynamic-source-chips" class="selected-groups"></div>
              <div class="source-picker-controls">
                <button id="dynamic-source-toggle" type="button">Select Sources</button>
                <button id="dynamic-source-clear" type="button">All Sources</button>
              </div>
              <div id="dynamic-source-dropdown" class="source-dropdown" hidden></div>
            </div>

            <input id="dynamic-query" type="text" placeholder="Catalog search query (token mode: |/OR and -term/!term; regex mode: full pattern)">
            <label class="mode-toggle">
              <input id="dynamic-search-regex" type="checkbox">
              Regex mode
            </label>
            <div id="dynamic-rule-hint" class="rule-hint"></div>
            <div id="dynamic-rule-warning" class="search-warning" hidden></div>
          </div>
          <button class="primary" type="submit">Save Channel</button>
          <button id="clear-channel-health-btn" class="secondary" type="button">Clear Health + Cooldowns</button>
          <button id="reload-btn" type="button">Reload</button>
        </form>
      </div>
    </section>

    <section class="panel">
      <h2>Add Source</h2>
      <div class="panel-body">
        <form id="source-add-form" class="toolbar">
          <input id="source-item-key" type="text" placeholder="Catalog item_key">
          <label>
            <input id="source-allow-cross" type="checkbox">
            Allow cross-channel attach
          </label>
          <button class="primary" type="submit">Add Source</button>
        </form>
      </div>
    </section>

    <section class="panel">
      <h2>Sources</h2>
      <div class="panel-body">
        <div id="sources-empty" class="empty" hidden>No sources attached.</div>
        <div id="source-list"></div>
      </div>
    </section>
  </main>

  <datalist id="dynamic-group-options"></datalist>

  <script>
    const channelID = Number({{.ChannelID}});

    const state = {
      channel: null,
      sources: [],
      catalogGroups: [],
      dynamicGroupNames: [],
      dynamicSourceIds: [],
      dynamicSearchRegex: false,
      playlistSources: [],
    };
    const channelPageLimit = 200;
    const sourcePageLimit = 200;

    const statusEl = document.getElementById("status");
    const channelMetaEl = document.getElementById("channel-meta");
    const sourceListEl = document.getElementById("source-list");
    const sourcesEmptyEl = document.getElementById("sources-empty");
    const guideNameEl = document.getElementById("guide-name");
    const channelEnabledEl = document.getElementById("channel-enabled");
    const dynamicEnabledEl = document.getElementById("dynamic-enabled");
    const dynamicQueryEl = document.getElementById("dynamic-query");
    const dynamicSearchRegexEl = document.getElementById("dynamic-search-regex");
    const dynamicRuleHintEl = document.getElementById("dynamic-rule-hint");
    const dynamicRuleWarningEl = document.getElementById("dynamic-rule-warning");
    const dynamicGroupInputEl = document.getElementById("dynamic-group-input");
    const dynamicGroupChipsEl = document.getElementById("dynamic-group-chips");
    const dynamicGroupOptionsEl = document.getElementById("dynamic-group-options");
    const dynamicSourceChipsEl = document.getElementById("dynamic-source-chips");
    const dynamicSourceDropdownEl = document.getElementById("dynamic-source-dropdown");
    const dynamicSourceToggleBtn = document.getElementById("dynamic-source-toggle");

    {{template "shared-js-show-status"}}
    {{template "shared-js-api"}}
    {{template "shared-js-group-helpers"}}
    {{template "shared-js-load-paged-collection"}}
    {{template "search-warning-summary-function"}}

    function handleError(err) {
      console.error(err);
      showStatus(err.message || "request failed", true);
    }

    function renderSearchWarning(searchWarning) {
      const message = formatSearchWarningSummary(searchWarning, "Dynamic rule");
      if (!message) {
        dynamicRuleWarningEl.hidden = true;
        dynamicRuleWarningEl.textContent = "";
        return;
      }
      dynamicRuleWarningEl.hidden = false;
      dynamicRuleWarningEl.textContent = message;
    }

    function groupAlias(groupNames) {
      return groupNames.length > 0 ? groupNames[0] : "";
    }

    function normalizeSourceIDs(raw) {
      if (!Array.isArray(raw)) {
        return [];
      }
      return raw.map(Number).filter((v) => Number.isFinite(v) && v > 0);
    }

    function normalizeDynamicRule(raw) {
      const rule = raw && typeof raw === "object" ? raw : {};
      const fromList = Array.isArray(rule.group_names) ? rule.group_names : [];
      const fromLegacy = normalizeGroupNameValue(rule.group_name || "");
      const groupNames = normalizeGroupNameList(fromList.length > 0 ? fromList : [fromLegacy]);
      return {
        enabled: Boolean(rule.enabled),
        group_name: groupAlias(groupNames),
        group_names: groupNames,
        source_ids: normalizeSourceIDs(rule.source_ids),
        search_query: String(rule.search_query || "").trim(),
        search_regex: Boolean(rule.search_regex),
      };
    }

    function dynamicRuleFromForm() {
      const groupNames = normalizeGroupNameList(state.dynamicGroupNames);
      return {
        enabled: Boolean(dynamicEnabledEl.checked),
        group_name: groupAlias(groupNames),
        group_names: groupNames,
        source_ids: normalizeSourceIDs(state.dynamicSourceIds),
        search_query: dynamicQueryEl.value.trim(),
        search_regex: Boolean(dynamicSearchRegexEl.checked),
      };
    }

    function renderDynamicGroupOptions() {
      dynamicGroupOptionsEl.innerHTML = "";
      const merged = normalizeGroupNameList(state.catalogGroups.concat(state.dynamicGroupNames));
      for (const groupName of merged) {
        const option = document.createElement("option");
        option.value = groupName;
        dynamicGroupOptionsEl.appendChild(option);
      }
    }

    function catalogGroupsURL() {
      const params = new URLSearchParams();
      params.set("include_counts", "0");
      if (state.dynamicSourceIds.length > 0) {
        params.set("source_ids", state.dynamicSourceIds.join(","));
      }
      return `/api/groups?${params.toString()}`;
    }

    async function loadCatalogGroups() {
      try {
        const groups = await loadPagedCollection(catalogGroupsURL(), "groups", 200);
        state.catalogGroups = groups.map(normalizeGroupName).filter((name) => name.length > 0);
      } catch (err) {
        console.warn("unable to load catalog groups for dynamic rule autocomplete", err);
        state.catalogGroups = [];
      }
      renderDynamicGroupOptions();
    }

    async function loadPlaylistSources() {
      try {
        const data = await api("/api/admin/playlist-sources");
        state.playlistSources = data.playlist_sources || [];
      } catch (err) {
        console.warn("unable to load playlist sources", err);
        state.playlistSources = [];
      }
    }

    function sourceNameByID(sourceID) {
      const src = state.playlistSources.find((s) => s.source_id === sourceID);
      return src ? src.name : `Source #${sourceID}`;
    }

    function renderDynamicSourceChips() {
      dynamicSourceChipsEl.innerHTML = "";
      if (state.dynamicSourceIds.length === 0) {
        const hint = document.createElement("div");
        hint.className = "empty";
        hint.textContent = "All sources selected.";
        dynamicSourceChipsEl.appendChild(hint);
        return;
      }

      for (const sourceID of state.dynamicSourceIds) {
        const chip = document.createElement("div");
        chip.className = "source-chip";

        const label = document.createElement("span");
        label.textContent = sourceNameByID(sourceID);

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.textContent = "x";
        removeBtn.setAttribute("aria-label", `Remove ${sourceNameByID(sourceID)}`);
        removeBtn.addEventListener("click", () => {
          state.dynamicSourceIds = state.dynamicSourceIds.filter((id) => id !== sourceID);
          renderDynamicSourceChips();
          renderDynamicSourceDropdown();
          onSourceFilterChanged();
        });

        chip.append(label, removeBtn);
        dynamicSourceChipsEl.appendChild(chip);
      }
    }

    function renderDynamicSourceDropdown() {
      dynamicSourceDropdownEl.innerHTML = "";
      for (const src of state.playlistSources) {
        const lbl = document.createElement("label");
        const cb = document.createElement("input");
        cb.type = "checkbox";
        cb.checked = state.dynamicSourceIds.includes(src.source_id);
        cb.addEventListener("change", () => {
          if (cb.checked) {
            if (!state.dynamicSourceIds.includes(src.source_id)) {
              state.dynamicSourceIds = normalizeSourceIDs([...state.dynamicSourceIds, src.source_id]);
            }
          } else {
            state.dynamicSourceIds = state.dynamicSourceIds.filter((id) => id !== src.source_id);
          }
          renderDynamicSourceChips();
          onSourceFilterChanged();
        });

        const span = document.createElement("span");
        span.textContent = src.name;
        lbl.append(cb, span);
        dynamicSourceDropdownEl.appendChild(lbl);
      }

      dynamicSourceToggleBtn.textContent = state.dynamicSourceIds.length > 0
        ? `Sources (${state.dynamicSourceIds.length} selected)`
        : "Select Sources";
    }

    function toggleSourceDropdown() {
      dynamicSourceDropdownEl.hidden = !dynamicSourceDropdownEl.hidden;
    }

    function clearDynamicSources() {
      state.dynamicSourceIds = [];
      renderDynamicSourceChips();
      renderDynamicSourceDropdown();
      onSourceFilterChanged();
    }

    function onSourceFilterChanged() {
      renderDynamicRuleHint(dynamicRuleFromForm());
      loadCatalogGroups().catch(handleError);
    }

    function renderDynamicGroupChips() {
      dynamicGroupChipsEl.innerHTML = "";
      if (state.dynamicGroupNames.length === 0) {
        const hint = document.createElement("div");
        hint.className = "empty";
        hint.textContent = "All groups selected.";
        dynamicGroupChipsEl.appendChild(hint);
        return;
      }

      for (const groupName of state.dynamicGroupNames) {
        const chip = document.createElement("div");
        chip.className = "group-chip";

        const label = document.createElement("span");
        label.textContent = groupName;

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.textContent = "x";
        removeBtn.setAttribute("aria-label", `Remove ${groupName}`);
        removeBtn.addEventListener("click", () => {
          state.dynamicGroupNames = state.dynamicGroupNames.filter((name) => name !== groupName);
          renderDynamicGroupChips();
          renderDynamicGroupOptions();
          renderDynamicRuleHint(dynamicRuleFromForm());
        });

        chip.append(label, removeBtn);
        dynamicGroupChipsEl.appendChild(chip);
      }
    }

    function addDynamicGroupFromInput() {
      const next = normalizeGroupNameValue(dynamicGroupInputEl.value);
      dynamicGroupInputEl.value = "";
      if (!next) {
        return;
      }
      if (state.dynamicGroupNames.includes(next)) {
        return;
      }
      state.dynamicGroupNames = normalizeGroupNameList(state.dynamicGroupNames.concat(next));
      renderDynamicGroupChips();
      renderDynamicGroupOptions();
      renderDynamicRuleHint(dynamicRuleFromForm());
    }

    function clearDynamicGroups() {
      state.dynamicGroupNames = [];
      renderDynamicGroupChips();
      renderDynamicGroupOptions();
      renderDynamicRuleHint(dynamicRuleFromForm());
    }

    function renderDynamicRuleHint(rule) {
      const dynamicRule = normalizeDynamicRule(rule);
      if (!dynamicRule.enabled) {
        dynamicRuleHintEl.textContent = "Dynamic mode disabled. Source updates only come from manual edits or static channel-key reconcile.";
        return;
      }
      const groupSummary = dynamicRule.group_names.length > 0
        ? dynamicRule.group_names.join(", ")
        : "all groups";
      const sourceSummary = dynamicRule.source_ids.length > 0
        ? dynamicRule.source_ids.map(sourceNameByID).join(", ")
        : "all sources";
      if (dynamicRule.search_regex) {
        dynamicRuleHintEl.textContent = `Dynamic mode enabled. Playlist sync follows sources [${sourceSummary}], groups [${groupSummary}] and regex pattern "${dynamicRule.search_query}" against full item names.`;
        return;
      }
      dynamicRuleHintEl.textContent = `Dynamic mode enabled. Playlist sync follows sources [${sourceSummary}], groups [${groupSummary}] and search "${dynamicRule.search_query}" using token mode (supports |/OR disjuncts plus -term/!term exclusions; no OR keeps legacy AND behavior).`;
    }

    function renderDynamicRuleWarning(rule, searchWarning) {
      renderDynamicRuleHint(rule);
      renderSearchWarning(searchWarning);
    }

    async function loadChannel() {
      const channels = await loadPagedCollection("/api/channels", "channels", channelPageLimit);
      state.channel = channels.find((ch) => Number(ch.channel_id) === channelID) || null;
      if (!state.channel) {
        throw new Error(`channel ${channelID} not found`);
      }

      const dynamicRule = normalizeDynamicRule(state.channel.dynamic_rule);
      const groupSummary = dynamicRule.group_names.length > 0
        ? dynamicRule.group_names.join(",")
        : "all";
      const mode = dynamicRule.enabled
        ? `dynamic (${groupSummary} | ${dynamicRule.search_query || "-"})`
        : `static (${state.channel.channel_key || "manual"})`;
      channelMetaEl.textContent = `ID ${state.channel.channel_id} | ${state.channel.guide_number} ${state.channel.guide_name} | mode=${mode}`;
      guideNameEl.value = state.channel.guide_name || "";
      channelEnabledEl.checked = Boolean(state.channel.enabled);
      dynamicEnabledEl.checked = dynamicRule.enabled;
      state.dynamicSearchRegex = Boolean(dynamicRule.search_regex);
      state.dynamicGroupNames = normalizeGroupNameList(dynamicRule.group_names);
      state.dynamicSourceIds = normalizeSourceIDs(dynamicRule.source_ids);
      renderDynamicGroupChips();
      renderDynamicGroupOptions();
      renderDynamicSourceChips();
      renderDynamicSourceDropdown();
      dynamicQueryEl.value = dynamicRule.search_query;
      dynamicSearchRegexEl.checked = state.dynamicSearchRegex;
      renderDynamicRuleWarning(dynamicRule, state.channel.search_warning);
    }

    async function loadSources() {
      state.sources = await loadPagedCollection(`/api/channels/${channelID}/sources`, "sources", sourcePageLimit);
      renderSources();
    }

    function formatUnix(ts) {
      const value = Number(ts || 0);
      if (!Number.isFinite(value) || value <= 0) {
        return "-";
      }
      return new Date(value * 1000).toLocaleString();
    }

    function formatFPS(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) {
        return "-";
      }
      return `${n.toFixed(2)} fps`;
    }

    function formatBitrate(value) {
      const n = Number(value);
      if (!Number.isFinite(n) || n <= 0) {
        return "-";
      }
      const units = ["bps", "Kbps", "Mbps", "Gbps"];
      let bitrate = n;
      let idx = 0;
      while (bitrate >= 1000 && idx < units.length - 1) {
        bitrate /= 1000;
        idx++;
      }
      return `${bitrate.toFixed(idx === 0 ? 0 : 2)} ${units[idx]}`;
    }

    function renderSources() {
      sourceListEl.innerHTML = "";
      sourcesEmptyEl.hidden = state.sources.length > 0;

      for (let i = 0; i < state.sources.length; i++) {
        const src = state.sources[i];
        const tvgName = String(src.tvg_name || "").trim() || "-";
        const profileResolution = Number(src.profile_width) > 0 && Number(src.profile_height) > 0
          ? `${src.profile_width}x${src.profile_height}`
          : "-";
        const profileFPS = formatFPS(src.profile_fps);
        const profileVideo = String(src.profile_video_codec || "").trim() || "-";
        const profileAudio = String(src.profile_audio_codec || "").trim() || "-";
        const profileBitrate = formatBitrate(src.profile_bitrate_bps);

        const row = document.createElement("div");
        row.className = "source-row";

        const title = document.createElement("div");
        title.className = "source-title";
        title.textContent = `Source #${src.source_id} | P${src.priority_index} | ${src.item_key}`;
        if (src.playlist_source_name) {
          const badge = document.createElement("span");
          badge.className = "source-badge";
          badge.textContent = src.playlist_source_name;
          title.append(" ", badge);
        }

        const meta = document.createElement("div");
        meta.className = "source-meta";
        meta.textContent = [
          `tvg_name=${tvgName}`,
          `association=${src.association_type}`,
          src.enabled ? "enabled" : "disabled",
          `ok=${src.success_count}`,
          `fail=${src.fail_count}`,
          `last_ok=${formatUnix(src.last_ok_at)}`,
          `last_fail=${formatUnix(src.last_fail_at)}`,
          `cooldown_until=${formatUnix(src.cooldown_until)}`,
          `last_probe=${formatUnix(src.last_probe_at)}`,
          `profile_res=${profileResolution}`,
          `profile_fps=${profileFPS}`,
          `profile_video=${profileVideo}`,
          `profile_audio=${profileAudio}`,
          `profile_bitrate=${profileBitrate}`,
        ].join(" | ");

        const sourceURL = String(src.stream_url || "").trim() || "-";
        const urlLine = document.createElement("div");
        urlLine.className = "source-url";
        urlLine.textContent = `URL: ${sourceURL}`;

        const actions = document.createElement("div");
        actions.className = "row-actions";

        const upBtn = document.createElement("button");
        upBtn.textContent = "Move Up";
        upBtn.disabled = i === 0;
        upBtn.addEventListener("click", () => reorderSource(i, -1));

        const downBtn = document.createElement("button");
        downBtn.textContent = "Move Down";
        downBtn.disabled = i === state.sources.length - 1;
        downBtn.addEventListener("click", () => reorderSource(i, +1));

        const toggleBtn = document.createElement("button");
        toggleBtn.className = "secondary";
        toggleBtn.textContent = src.enabled ? "Disable" : "Enable";
        toggleBtn.addEventListener("click", () => setSourceEnabled(src, !src.enabled));

        const removeBtn = document.createElement("button");
        removeBtn.className = "danger";
        removeBtn.textContent = "Remove";
        removeBtn.addEventListener("click", () => removeSource(src));

        actions.append(upBtn, downBtn, toggleBtn, removeBtn);
        row.append(title, meta, urlLine, actions);
        sourceListEl.appendChild(row);
      }
    }

    async function loadAll() {
      await loadPlaylistSources();
      await Promise.all([loadCatalogGroups(), loadChannel()]);
      await loadSources();
    }

    async function saveChannel(event) {
      event.preventDefault();

      const guideName = guideNameEl.value.trim();
      const enabled = Boolean(channelEnabledEl.checked);
      const dynamicRule = dynamicRuleFromForm();

      if (!guideName) {
        showStatus("Guide name must not be empty", true);
        return;
      }
      if (dynamicRule.enabled && !dynamicRule.search_query) {
        showStatus("Dynamic rule requires search query when enabled (groups are optional)", true);
        return;
      }

      const updated = await api(`/api/channels/${channelID}`, {
        method: "PATCH",
        body: JSON.stringify({
          guide_name: guideName,
          enabled,
          dynamic_rule: dynamicRule,
        }),
      });

      await loadChannel();
      renderDynamicRuleWarning(normalizeDynamicRule(updated?.channel?.dynamic_rule), updated?.search_warning);
      const warning = formatSearchWarningSummary(updated?.search_warning, "Dynamic rule");
      showStatus(`Channel updated${warning ? ` (${warning})` : ""}`);
    }

    async function addSource(event) {
      event.preventDefault();

      const itemKey = document.getElementById("source-item-key").value.trim();
      const allowCross = Boolean(document.getElementById("source-allow-cross").checked);

      if (!itemKey) {
        showStatus("item_key is required", true);
        return;
      }

      try {
        await api(`/api/channels/${channelID}/sources`, {
          method: "POST",
          body: JSON.stringify({
            item_key: itemKey,
            allow_cross_channel: allowCross,
          }),
        });
      } catch (err) {
        if (!allowCross && String(err.message || "").toLowerCase().includes("metadata does not match")) {
          const confirmed = window.confirm(
            "Source metadata does not match this channel. Attach manually anyway?"
          );
          if (!confirmed) {
            return;
          }
          await api(`/api/channels/${channelID}/sources`, {
            method: "POST",
            body: JSON.stringify({
              item_key: itemKey,
              allow_cross_channel: true,
            }),
          });
        } else {
          throw err;
        }
      }

      document.getElementById("source-item-key").value = "";
      document.getElementById("source-allow-cross").checked = false;
      await loadSources();
      showStatus("Source attached");
    }

    async function reorderSource(index, delta) {
      const next = [...state.sources];
      const target = index + delta;
      if (target < 0 || target >= next.length) {
        return;
      }

      const tmp = next[index];
      next[index] = next[target];
      next[target] = tmp;

      await api(`/api/channels/${channelID}/sources/reorder`, {
        method: "PATCH",
        body: JSON.stringify({ source_ids: next.map((s) => s.source_id) }),
      });

      await loadSources();
      showStatus("Sources reordered");
    }

    async function setSourceEnabled(src, enabled) {
      await api(`/api/channels/${channelID}/sources/${src.source_id}`, {
        method: "PATCH",
        body: JSON.stringify({ enabled }),
      });

      await loadSources();
      showStatus(enabled ? "Source enabled" : "Source disabled");
    }

    async function removeSource(src) {
      const confirmed = window.confirm(`Remove source ${src.item_key}?`);
      if (!confirmed) {
        return;
      }

      await api(`/api/channels/${channelID}/sources/${src.source_id}`, {
        method: "DELETE",
      });

      await loadSources();
      showStatus("Source removed");
    }

    async function clearChannelHealth() {
      const confirmed = window.confirm(
        "Clear health stats and cooldown windows for all sources on this channel?"
      );
      if (!confirmed) {
        return;
      }

      const data = await api(`/api/channels/${channelID}/sources/health/clear`, {
        method: "POST",
      });
      const cleared = Number(data?.cleared || 0);
      const noun = cleared === 1 ? "source" : "sources";

      await loadSources();
      showStatus(`Cleared health stats and cooldown windows for ${cleared} ${noun}`);
    }

    document.getElementById("channel-form").addEventListener("submit", (event) => {
      saveChannel(event).catch(handleError);
    });

    document.getElementById("source-add-form").addEventListener("submit", (event) => {
      addSource(event).catch(handleError);
    });

    document.getElementById("reload-btn").addEventListener("click", () => {
      loadAll().then(() => showStatus("Channel reloaded")).catch(handleError);
    });

    document.getElementById("clear-channel-health-btn").addEventListener("click", () => {
      clearChannelHealth().catch(handleError);
    });

    dynamicEnabledEl.addEventListener("change", () => {
      renderDynamicRuleHint(dynamicRuleFromForm());
    });

    dynamicQueryEl.addEventListener("input", () => {
      renderDynamicRuleHint(dynamicRuleFromForm());
    });

    dynamicSearchRegexEl.addEventListener("change", () => {
      state.dynamicSearchRegex = Boolean(dynamicSearchRegexEl.checked);
      renderDynamicRuleHint(dynamicRuleFromForm());
    });

    document.getElementById("dynamic-group-add").addEventListener("click", () => {
      addDynamicGroupFromInput();
    });

    dynamicGroupInputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === ",") {
        event.preventDefault();
        addDynamicGroupFromInput();
      }
    });

    document.getElementById("dynamic-group-clear").addEventListener("click", () => {
      clearDynamicGroups();
    });

    dynamicSourceToggleBtn.addEventListener("click", () => {
      toggleSourceDropdown();
    });

    document.getElementById("dynamic-source-clear").addEventListener("click", () => {
      clearDynamicSources();
    });

    loadAll().catch(handleError);
  </script>
</body>
</html>
