stages:
  - build
  - publish

variables:
  IMAGE_TAG: latest

build_binary:
  stage: build
  image: golang:1.25-bookworm
  script:
    - go version
    - go mod download
    - mkdir -p dist
    - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/hdhriptv-linux-amd64 ./cmd/hdhriptv
    - CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dist/hdhriptv-linux-arm64 ./cmd/hdhriptv
    - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dist/hdhriptv-windows-amd64.exe ./cmd/hdhriptv
  artifacts:
    paths:
      - dist/hdhriptv-linux-amd64
      - dist/hdhriptv-linux-arm64
      - dist/hdhriptv-windows-amd64.exe
    expire_in: 1 week

build_and_publish_container:
  stage: publish
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
  needs:
    - job: build_binary
      artifacts: true
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2
  before_script:
    - docker version
    - echo "${CI_REGISTRY_PASSWORD}" | docker login "${CI_REGISTRY}" -u "${CI_REGISTRY_USER}" --password-stdin
    - docker run --privileged --rm tonistiigi/binfmt --install arm64,amd64
    - docker buildx create --name hdhriptv-multiarch --driver docker-container --use
    - docker buildx inspect --bootstrap
  script:
    - test -f dist/hdhriptv-linux-amd64
    - test -f dist/hdhriptv-linux-arm64
    - docker buildx build --platform linux/amd64,linux/arm64 --provenance=false --tag "${CI_REGISTRY_IMAGE}:${IMAGE_TAG}" --push .
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
